<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>易经占卜 — 禅意风格</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      theme: {
        extend: {
          colors: {
            stone: {
              50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 300: '#d6d3d1',
              400: '#a8a29e', 500: '#78716c', 600: '#57534e', 700: '#44403c',
              800: '#292524', 900: '#1c1917',
            },
            ink: '#1a1a1a',
            paper: '#f8f6f3',
          },
          fontFamily: {
            display: ['"Noto Serif SC"', 'serif'],
            body: ['"PingFang SC"', '"Hiragino Sans GB"', 'sans-serif'],
          },
        },
      },
    }
  </script>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: #fafaf9;
      color: #1a1a1a;
      min-height: 100vh;
    }
    
    .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }
    
    .slide-up { animation: slideUp 0.5s ease-out forwards; opacity: 0; transform: translateY(20px); }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    
    .coin {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #d4a843 0%, #c49a1a 100%);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1), inset 0 2px 4px rgba(255,255,255,0.3);
      transition: transform 0.3s ease;
    }
    .coin.flipping { animation: coinFlip 0.8s ease-in-out; }
    @keyframes coinFlip {
      0% { transform: rotateY(0deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.1); }
      100% { transform: rotateY(360deg) scale(1); }
    }
    
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #d6d3d1; transition: all 0.3s ease; }
    .step-dot.active { background: #1a1a1a; width: 24px; }
    .step-dot.completed { background: #8b7355; }
    
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { background: #f5f5f4; }
  </style>
</head>
<body>
  <!-- 首页 -->
  <div id="home" class="min-h-screen">
    <nav class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-sm border-b border-stone-200 z-50">
      <div class="max-w-md mx-auto px-6 h-14 flex items-center justify-between">
        <span class="font-display text-lg font-light tracking-widest">易经</span>
        <button class="text-stone-500 hover:text-stone-800 transition-colors">⚙️</button>
      </div>
    </nav>
    
    <main class="pt-14 pb-24 px-6">
      <div class="max-w-md mx-auto">
        <div class="py-16 text-center fade-in">
          <div class="mb-8">
            <svg class="w-24 h-24 mx-auto opacity-60" viewBox="0 0 100 100" fill="none">
              <circle cx="50" cy="50" r="48" stroke="#d6d3d1" stroke-width="1"/>
              <circle cx="50" cy="50" r="36" stroke="#d6d3d1" stroke-width="1"/>
              <circle cx="50" cy="50" r="24" stroke="#d6d3d1" stroke-width="1"/>
              <circle cx="50" cy="50" r="12" stroke="#d6d3d1" stroke-width="1"/>
            </svg>
          </div>
          <h1 class="font-display text-4xl font-light tracking-widest mb-4">易经占卜</h1>
          <p class="text-stone-500 font-light tracking-wide">周易古占 · 决策辅助</p>
          <div class="w-16 h-px bg-stone-300 mx-auto my-8"></div>
          <button class="w-full py-4 bg-ink text-white font-light tracking-widest hover:bg-stone-800 transition-colors duration-300">
            开始起卦
          </button>
          <p class="mt-6 text-xs text-stone-400 tracking-wide">今日已占 3 次</p>
        </div>
        
        <div class="space-y-2 mt-8">
          <div class="flex items-center justify-between py-4 px-4 border-b border-stone-200 card-hover cursor-pointer">
            <span class="font-light">历史记录</span>
            <span class="text-stone-400 text-sm">12 条</span>
          </div>
          <div class="flex items-center justify-between py-4 px-4 border-b border-stone-200 card-hover cursor-pointer">
            <span class="font-light">统计分析</span>
            <span class="text-stone-400 text-sm">准确率 78%</span>
          </div>
          <div class="flex items-center justify-between py-4 px-4 border-b border-stone-200 card-hover cursor-pointer">
            <span class="font-light">设置</span>
            <span class="text-stone-400 text-sm"></span>
          </div>
        </div>
        
        <div class="mt-8 p-4 bg-stone-100 rounded-lg slide-up" style="animation-delay: 0.3s;">
          <div class="flex items-center justify-between mb-3">
            <span class="text-sm font-light">待反馈</span>
            <span class="text-xs text-stone-500">2 条</span>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-sm text-stone-600">跟老板谈加薪能成吗</span>
            <div class="flex gap-2">
              <button class="px-3 py-1 text-xs bg-white rounded hover:bg-stone-50">准</button>
              <button class="px-3 py-1 text-xs bg-white rounded hover:bg-stone-50">不准</button>
              <button class="px-3 py-1 text-xs bg-white rounded hover:bg-stone-50">待定</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    
    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-sm border-t border-stone-200">
      <div class="max-w-md mx-auto flex justify-around py-3">
        <a class="flex flex-col items-center gap-1 text-ink"><span class="text-lg">/</span><span class="text-xs font-light">首页</span></a>
        <a class="flex flex-col items-center gap-1 text-stone-400"><span class="text-lg">/divine</span><span class="text-xs font-light">起卦</span></a>
        <a class="flex flex-col items-center gap-1 text-stone-400"><span class="text-lg">/history</span><span class="text-xs font-light">历史</span></a>
        <a class="flex flex-col items-center gap-1 text-stone-400"><span class="text-lg">/stats</span><span class="text-xs font-light">统计</span></a>
      </div>
    </nav>
  </div>
  
  <!-- 起卦页面 -->
  <div id="divine" class="min-h-screen hidden">
    <nav class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-sm border-b border-stone-200 z-50">
      <div class="max-w-md mx-auto px-6 h-14 flex items-center justify-between">
        <button onclick="showPage('home')" class="text-stone-500 hover:text-stone-800 transition-colors">← 返回</button>
        <span class="font-display text-lg font-light tracking-widest">起卦</span>
        <div class="w-10"></div>
      </div>
    </nav>
    
    <div class="fixed top-14 left-0 right-0 bg-white/80 backdrop-blur-sm z-40">
      <div class="max-w-md mx-auto px-6 py-4 flex justify-center gap-2">
        <div class="step-dot active" data-step="1"></div>
        <div class="step-dot" data-step="2"></div>
        <div class="step-dot" data-step="3"></div>
        <div class="step-dot" data-step="4"></div>
      </div>
    </div>
    
    <main class="pt-32 pb-24 px-6">
      <div class="max-w-md mx-auto">
        <!-- 步骤 1 -->
        <div id="step1" class="space-y-8 fade-in">
          <div class="text-center">
            <h2 class="font-display text-2xl font-light tracking-widest mb-2">你想问什么</h2>
            <p class="text-sm text-stone-500 font-light">心中所想，即为所问</p>
          </div>
          <textarea class="w-full h-32 px-4 py-3 border border-stone-200 rounded-lg resize-none focus:outline-none focus:border-stone-400 transition-colors font-light" placeholder="请输入你的问题..."></textarea>
          <div>
            <p class="text-sm text-stone-500 mb-3 font-light">问题分类</p>
            <div class="flex flex-wrap gap-2">
              <button class="px-4 py-2 text-sm border border-stone-200 rounded-full hover:border-stone-400 transition-colors">工作</button>
              <button class="px-4 py-2 text-sm border border-stone-200 rounded-full hover:border-stone-400 transition-colors">人际</button>
              <button class="px-4 py-2 text-sm border border-stone-200 rounded-full hover:border-stone-400 transition-colors">财务</button>
              <button class="px-4 py-2 text-sm border border-stone-200 rounded-full hover:border-stone-400 transition-colors">健康</button>
              <button class="px-4 py-2 text-sm border border-stone-200 rounded-full hover:border-stone-400 transition-colors">其他</button>
            </div>
          </div>
          <button onclick="nextStep(2)" class="w-full py-4 bg-ink text-white font-light tracking-widest hover:bg-stone-800 transition-colors duration-300">下一步</button>
        </div>
        
        <!-- 步骤 4: 摇卦 -->
        <div id="step4" class="space-y-8 hidden slide-up">
          <div class="text-center">
            <h2 class="font-display text-2xl font-light tracking-widest mb-2">虚拟摇卦</h2>
            <p class="text-sm text-stone-500 font-light">初爻 · 第 1/6 爻</p>
          </div>
          <div class="flex justify-center gap-6 py-8">
            <div class="coin" id="coin1"></div>
            <div class="coin" id="coin2"></div>
            <div class="coin" id="coin3"></div>
          </div>
          <div class="text-center">
            <button onclick="flipCoins()" class="px-8 py-3 bg-ink text-white font-light tracking-widest hover:bg-stone-800 transition-colors duration-300">投掷</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <!-- 历史页面 -->
  <div id="history" class="min-h-screen hidden">
    <nav class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-sm border-b border-stone-200 z-50">
      <div class="max-w-md mx-auto px-6 h-14 flex items-center justify-between">
        <button onclick="showPage('home')" class="text-stone-500 hover:text-stone-800 transition-colors">← 返回</button>
        <span class="font-display text-lg font-light tracking-widest">历史</span>
        <div class="w-10"></div>
      </div>
    </nav>
    <main class="pt-14 pb-24 px-6">
      <div class="max-w-md mx-auto py-8 space-y-4">
        <div class="p-4 border border-stone-200 rounded-lg card-hover cursor-pointer">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm text-stone-500">工作</span>
            <span class="text-xs text-stone-400">2026-06-01</span>
          </div>
          <p class="font-light">跟老板谈加薪能成吗</p>
          <div class="mt-3 flex items-center gap-2">
            <span class="px-2 py-1 text-xs bg-stone-100 rounded">乾为天</span>
            <span class="px-2 py-1 text-xs bg-green-50 text-green-700 rounded">准</span>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script>
    function showPage(id) {
      ['home','divine','history','stats'].forEach(p => document.getElementById(p)?.classList.add('hidden'));
      document.getElementById(id)?.classList.remove('hidden');
    }
    function nextStep(step) {
      for (let i = 1; i <= 4; i++) document.getElementById('step'+i)?.classList.add('hidden');
      document.getElementById('step'+step)?.classList.remove('hidden');
      document.querySelectorAll('.step-dot').forEach((d, i) => {
        d.classList.remove('active','completed');
        if (i+1 < step) d.classList.add('completed');
        if (i+1 === step) d.classList.add('active');
      });
    }
    function flipCoins() {
      ['coin1','coin2','coin3'].forEach(id => document.getElementById(id)?.classList.add('flipping'));
      setTimeout(() => ['coin1','coin2','coin3'].forEach(id => document.getElementById(id)?.classList.remove('flipping')), 800);
    }
  </script>
</body>
</html>
